<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestOS — операционная система вашего ресторана</title>
<meta name="description" content="CRM + аналитика + автоматизация для ресторанов. Бронирования, кухня, персонал, маркетинг и интеграция с iiko — в одном дашборде.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?external=react,react-dom",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#070b0a;
    --bg-2:#0b1211;
    --surface:rgba(255,255,255,.04);
    --surface-2:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.09);
    --border-strong:rgba(255,255,255,.16);
    --text:#eef3f1;
    --text-dim:#a3b3ad;
    --text-mute:#6f817b;
    --green:#1fae7d;
    --green-bright:#37e6a6;
    --green-soft:rgba(31,174,125,.14);
    --blue:#3b9add;
    --amber:#e8a13a;
    --red:#e2625c;
    --radius:18px;
    --shadow:0 24px 70px -24px rgba(0,0,0,.7);
  }
  html{scroll-behavior:smooth;scroll-padding-top:84px;-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(55% 45% at 78% -5%, rgba(55,230,166,.10), transparent 60%),
      radial-gradient(45% 40% at 5% 12%, rgba(31,174,125,.08), transparent 60%);
    background-attachment:fixed;
  }
  ::selection{background:var(--green);color:#04130d}
  h1,h2,h3{font-family:'Sora',sans-serif;letter-spacing:-.02em;line-height:1.12}
  a{color:inherit;text-decoration:none}
  img,svg{display:block}

  /* loading */
  .boot{min-height:100vh;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;color:var(--text-mute)}
  .boot .bmark{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--green-bright),var(--green));display:flex;align-items:center;justify-content:center;color:#04130d;font-size:24px;animation:bp 1.4s ease-in-out infinite}
  @keyframes bp{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}

  /* progress */
  .progress{position:fixed;top:0;left:0;right:0;height:3px;transform-origin:0%;background:linear-gradient(90deg,var(--green),var(--green-bright));z-index:100}

  /* nav */
  .nav{position:sticky;top:0;z-index:90;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(7,11,10,.62);border-bottom:1px solid var(--border)}
  .nav-in{max-width:1140px;margin:0 auto;padding:13px clamp(18px,5vw,40px);display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Sora';font-weight:700;font-size:18px;letter-spacing:-.02em}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--green-bright),var(--green));display:flex;align-items:center;justify-content:center;color:#04130d;font-size:18px;box-shadow:0 6px 18px -6px rgba(31,174,125,.6)}
  .nav-links{display:flex;gap:28px;align-items:center}
  .nav-links a{font-size:14px;color:var(--text-dim);transition:color .18s}
  .nav-links a:hover{color:var(--text)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter';font-weight:600;font-size:15px;padding:13px 24px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:transform .18s ease,box-shadow .18s ease,background .18s ease;white-space:nowrap;background:none}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:linear-gradient(135deg,var(--green-bright),var(--green));color:#04130d;box-shadow:0 12px 32px -10px rgba(31,174,125,.55)}
  .btn-primary:hover{box-shadow:0 16px 40px -10px rgba(55,230,166,.65);transform:translateY(-2px)}
  .btn-ghost{background:var(--surface);border-color:var(--border-strong);color:var(--text)}
  .btn-ghost:hover{background:var(--surface-2);border-color:var(--green)}
  .btn-sm{padding:9px 18px;font-size:14px}

  .wrap{max-width:1140px;margin:0 auto;padding:0 clamp(18px,5vw,40px)}
  section{padding:clamp(64px,9vw,128px) 0;position:relative}
  .label{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--green-bright);margin-bottom:16px}
  .h2{font-size:clamp(28px,4.4vw,44px);font-weight:700;margin-bottom:14px}
  .lead{font-size:clamp(15px,2vw,18px);color:var(--text-dim);max-width:640px}

  /* hero */
  .hero{padding-top:clamp(48px,8vh,88px);overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:34px 34px;
    -webkit-mask:radial-gradient(62% 60% at 50% 16%,#000,transparent 76%);mask:radial-gradient(62% 60% at 50% 16%,#000,transparent 76%)}
  .pill{display:inline-flex;align-items:center;gap:8px;background:var(--green-soft);border:1px solid rgba(55,230,166,.25);color:var(--green-bright);font-size:13px;font-weight:600;padding:7px 15px;border-radius:30px;margin-bottom:24px}
  .hero h1{font-size:clamp(34px,6.4vw,68px);font-weight:800;margin-bottom:22px;background:linear-gradient(180deg,#fff 30%,#b9ccc4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero h1 .accent{background:linear-gradient(135deg,var(--green-bright),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-sub{font-size:clamp(16px,2.2vw,20px);color:var(--text-dim);max-width:600px;margin-bottom:34px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:46px;max-width:680px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
  .stat-val{font-family:'Sora';font-size:clamp(24px,3.6vw,34px);font-weight:800;color:var(--green-bright);line-height:1}
  .stat-label{font-size:13px;color:var(--text-dim);margin-top:8px;line-height:1.4}

  .trust{display:flex;align-items:center;gap:10px 26px;flex-wrap:wrap;margin-top:40px;color:var(--text-mute);font-size:14px}
  .trust i{color:var(--green);font-size:18px;vertical-align:-3px;margin-right:6px}

  /* hero mock */
  .hero-mock{margin-top:56px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:var(--shadow);position:relative}
  .mock-bar{display:flex;align-items:center;gap:6px;padding:4px 6px 14px}
  .mock-dot{width:11px;height:11px;border-radius:50%}
  .mock-url{font-size:12px;color:var(--text-mute);margin-left:12px;font-family:'Inter'}
  .mock-body{display:flex;gap:14px}
  .mock-side{width:170px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
  .mock-side .ttl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);margin-bottom:6px;padding-left:10px}
  .mnav{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-dim);padding:8px 11px;border-radius:9px}
  .mnav i{font-size:15px}
  .mnav.on{background:var(--green-soft);color:var(--green-bright)}
  .mock-main{flex:1;min-width:0}
  .mmetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .mmetric{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px;padding:12px 13px}
  .mmetric .l{font-size:11px;color:var(--text-mute)}
  .mmetric .v{font-family:'Sora';font-size:clamp(15px,2vw,20px);font-weight:700;margin-top:4px}
  .mrow{display:flex;align-items:center;gap:10px;font-size:13px;padding:11px 4px;border-bottom:1px solid var(--border);color:var(--text-dim)}
  .mrow:last-child{border-bottom:none}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:30px;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
  .b-green{background:var(--green-soft);color:var(--green-bright)}
  .b-amber{background:rgba(232,161,58,.16);color:var(--amber)}
  .b-blue{background:rgba(59,154,221,.16);color:var(--blue)}
  .b-red{background:rgba(226,98,92,.13);color:var(--red)}

  /* generic cards grid */
  .grid{display:grid;gap:16px;margin-top:44px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .gauto{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
  .feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px;transition:border-color .2s,background .2s,box-shadow .2s;will-change:transform}
  .feature-card:hover{border-color:rgba(55,230,166,.4);background:var(--surface-2);box-shadow:0 20px 50px -24px rgba(31,174,125,.4)}
  .feature-icon{width:50px;height:50px;border-radius:13px;background:var(--green-soft);border:1px solid rgba(55,230,166,.22);display:flex;align-items:center;justify-content:center;color:var(--green-bright);font-size:24px;margin-bottom:18px}
  .feature-card h3{font-size:19px;font-weight:700;margin-bottom:9px}
  .feature-card p{font-size:14px;color:var(--text-dim);line-height:1.6}

  /* problem */
  .prob{display:flex;gap:16px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
  .prob-ic{width:44px;height:44px;border-radius:11px;background:rgba(226,98,92,.13);border:1px solid rgba(226,98,92,.22);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:21px;flex-shrink:0}
  .prob h3{font-size:16px;font-weight:600;margin-bottom:5px}
  .prob p{font-size:14px;color:var(--text-dim)}

  /* roles */
  .role{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;border-top:3px solid var(--rc,#1fae7d)}
  .role-name{display:flex;align-items:center;gap:9px;font-family:'Sora';font-weight:700;font-size:17px;margin-bottom:14px}
  .role-name i{font-size:19px;color:var(--rc)}
  .role ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .role li{font-size:14px;color:var(--text-dim);display:flex;gap:9px;align-items:flex-start}
  .role li i{color:var(--green);font-size:15px;margin-top:3px;flex-shrink:0}
  .note{display:flex;gap:13px;align-items:flex-start;background:var(--green-soft);border:1px solid rgba(55,230,166,.2);border-radius:13px;padding:18px 20px;margin-top:22px;font-size:14.5px;color:var(--text-dim)}
  .note i{color:var(--green-bright);font-size:20px;flex-shrink:0;margin-top:1px}
  .note strong{color:var(--text)}

  /* results bars */
  .bars{margin-top:40px;display:flex;flex-direction:column;gap:20px;max-width:760px}
  .bar-row{display:flex;align-items:center;gap:18px}
  .bar-label{font-size:14.5px;color:var(--text-dim);width:240px;flex-shrink:0}
  .bar-track{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--green),var(--green-bright))}
  .bar-val{font-family:'Sora';font-weight:700;font-size:16px;width:54px;text-align:right;color:var(--green-bright)}
  .quote{margin-top:34px;border-left:3px solid var(--green);background:var(--surface);border-radius:0 14px 14px 0;padding:22px 24px}
  .quote p{font-size:16px;font-style:italic;color:var(--text);line-height:1.65}
  .quote .who{font-size:13px;color:var(--text-mute);margin-top:12px;font-style:normal}

  /* pricing */
  .price-wrap{max-width:920px;margin:48px auto 0}
  .price-card{position:relative;border-radius:24px;padding:2px;background:linear-gradient(135deg,rgba(55,230,166,.7),rgba(59,154,221,.35),rgba(255,255,255,.06));box-shadow:var(--shadow)}
  .price-inner{background:linear-gradient(180deg,#0c1413,#0a100f);border-radius:22px;padding:clamp(28px,4vw,44px)}
  .price-hero{text-align:center;padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:28px}
  .price-amount{font-family:'Sora';font-size:clamp(44px,8vw,68px);font-weight:800;line-height:1;background:linear-gradient(135deg,#fff,var(--green-bright));-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
  .price-per{font-size:18px;color:var(--text-dim);font-family:'Inter';font-weight:400;margin-left:6px}
  .price-note{font-size:14px;color:var(--text-mute);margin-top:10px}
  .price-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px 36px}
  .price-cols h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mute);margin-bottom:14px;font-family:'Inter';font-weight:600}
  .price-cols ul{list-style:none;display:flex;flex-direction:column;gap:11px}
  .price-cols li{display:flex;gap:11px;font-size:14.5px;color:var(--text-dim);align-items:flex-start}
  .price-cols li i{color:var(--green-bright);font-size:18px;flex-shrink:0;margin-top:2px}
  .price-foot{margin-top:30px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
  .value-note{display:flex;gap:12px;align-items:center;background:var(--green-soft);border:1px solid rgba(55,230,166,.2);border-radius:13px;padding:16px 20px;margin-top:24px;font-size:14.5px;color:var(--text-dim);max-width:920px;margin-left:auto;margin-right:auto}
  .value-note i{color:var(--green-bright);font-size:22px;flex-shrink:0}
  .value-note strong{color:var(--text)}

  /* contact */
  .contact-card{text-align:center;max-width:760px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:clamp(36px,6vw,64px) clamp(24px,5vw,52px);box-shadow:var(--shadow)}
  .contact-card h2{font-size:clamp(26px,4.5vw,42px);font-weight:800;margin-bottom:16px}
  .contact-card .lead{margin:0 auto 32px}
  .contact-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
  .dev{display:inline-flex;align-items:center;gap:14px;background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:14px 22px}
  .dev-av{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--green-bright),var(--green));display:flex;align-items:center;justify-content:center;color:#04130d;font-weight:800;font-family:'Sora'}
  .dev-info{text-align:left}
  .dev-name{font-weight:700;font-size:15px}
  .dev-sub{font-size:13px;color:var(--text-mute)}

  footer{border-top:1px solid var(--border);padding:34px 0;color:var(--text-mute);font-size:14px}
  .foot-in{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between}

  /* ── Intro Modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(2,8,6,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:linear-gradient(160deg,#0e1715 0%,#091110 100%);border:1px solid rgba(55,230,166,.3);border-radius:28px;padding:clamp(28px,5vw,46px);max-width:440px;width:100%;text-align:center;box-shadow:0 60px 140px -30px rgba(0,0,0,.95),0 0 0 1px rgba(55,230,166,.08),inset 0 1px 0 rgba(255,255,255,.06)}
  .modal-av{width:76px;height:76px;border-radius:20px;background:linear-gradient(135deg,var(--green-bright),var(--green));display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:36px;box-shadow:0 14px 36px -8px rgba(31,174,125,.6)}
  .modal-tag{display:inline-flex;align-items:center;gap:6px;background:var(--green-soft);border:1px solid rgba(55,230,166,.2);color:var(--green-bright);font-size:11px;font-weight:700;padding:5px 13px;border-radius:30px;margin-bottom:20px;letter-spacing:.06em;text-transform:uppercase}
  .modal-box h3{font-family:'Sora';font-size:23px;font-weight:800;margin-bottom:10px;background:linear-gradient(180deg,#fff 20%,#b9ccc4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .modal-box p{color:var(--text-dim);font-size:15px;line-height:1.65;margin-bottom:6px}
  .modal-box strong{color:var(--green-bright)}
  .modal-phone{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface);border:1px solid var(--border-strong);border-radius:14px;padding:15px 20px;margin:22px 0;font-family:'Sora';font-weight:700;font-size:19px;color:var(--text);transition:border-color .2s,box-shadow .2s;text-decoration:none}
  .modal-phone:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(31,174,125,.12)}
  .modal-phone i{color:var(--green-bright);font-size:20px}
  .modal-cta{width:100%;justify-content:center;padding:15px 24px;font-size:16px}
  .modal-divider{display:flex;align-items:center;gap:12px;color:var(--text-mute);font-size:13px;margin:18px 0}
  .modal-divider::before,.modal-divider::after{content:'';flex:1;height:1px;background:var(--border)}

  @media(max-width:860px){
    .g3,.gauto{grid-template-columns:repeat(2,1fr)}
    .nav-links{display:none}
    .hero-mock .mock-side{display:none}
    .bar-label{width:150px;font-size:13.5px}
  }
  @media(max-width:560px){
    .g3,.g2,.gauto,.price-cols{grid-template-columns:1fr}
    .hero-stats{grid-template-columns:1fr 1fr}
    .mmetrics{grid-template-columns:1fr 1fr}
    .price-foot{flex-direction:column;align-items:stretch}
    .price-foot .btn{width:100%;justify-content:center}
    .bar-row{flex-wrap:wrap;gap:8px}
    .bar-label{width:100%}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <div class="bmark"><i class="ti ti-tools-kitchen-2"></i></div>
    <div>Загрузка RestOS…</div>
  </div>
</div>

<script type="module">
import React from 'react';
import { createRoot } from 'react-dom/client';
import { motion, AnimatePresence, useScroll, useSpring, useInView, animate } from 'framer-motion';
import htm from 'htm';

const html = htm.bind(React.createElement);
const F = React.Fragment;
const EASE = [0.22, 1, 0.36, 1];

/* ---------- helpers ---------- */
function FadeIn({ children, delay = 0, y = 26, className = '' }) {
  return html`<${motion.div}
    className=${className}
    initial=${{ opacity: 0, y }}
    whileInView=${{ opacity: 1, y: 0 }}
    viewport=${{ once: true, amount: 0.25 }}
    transition=${{ duration: 0.6, delay, ease: EASE }}>
    ${children}
  <//>`;
}

function Counter({ to, suffix = '', prefix = '', duration = 1.5 }) {
  const ref = React.useRef(null);
  const inView = useInView(ref, { once: true, margin: '0px 0px -60px 0px' });
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    if (!inView) return;
    const controls = animate(0, to, { duration, ease: EASE, onUpdate: v => setN(v) });
    return () => controls.stop();
  }, [inView, to]);
  return html`<span ref=${ref}>${prefix}${Math.round(n).toLocaleString('ru-RU')}${suffix}</span>`;
}

/* ---------- data ---------- */
const FEATURES = [
